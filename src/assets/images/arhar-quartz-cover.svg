<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="50%" style="stop-color:#0a0e1f"/>
      <stop offset="100%" style="stop-color:#060810"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8952a"/>
      <stop offset="50%" style="stop-color:#e8c96a"/>
      <stop offset="100%" style="stop-color:#b8952a"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a07830;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#a07830;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#c9a84c" stroke-width="0.5">
    <line x1="0" y1="150" x2="1600" y2="150"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>

  <!-- Left side - bar chart -->
  <g transform="translate(80, 500)">
    <rect x="0" y="-280" width="40" height="280" rx="3" fill="url(#bar1)" opacity="0.8"/>
    <rect x="55" y="-200" width="40" height="200" rx="3" fill="url(#bar2)" opacity="0.7"/>
    <rect x="110" y="-240" width="40" height="240" rx="3" fill="url(#bar1)" opacity="0.8"/>
    <rect x="165" y="-160" width="40" height="160" rx="3" fill="url(#bar2)" opacity="0.7"/>
    <rect x="220" y="-320" width="40" height="320" rx="3" fill="url(#bar1)" opacity="0.9"/>
    <line x1="-10" y1="0" x2="275" y2="0" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Right side line chart -->
  <g transform="translate(1100, 0)">
    <polyline points="0,600 80,520 160,480 240,380 320,320 400,280 480,200" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
    <circle cx="400" cy="280" r="5" fill="#e8c96a" opacity="0.8"/>
    <circle cx="480" cy="200" r="7" fill="#e8c96a" opacity="1" filter="url(#glow)"/>
  </g>

  <!-- Main content -->
  <!-- Logo / Brand -->
  <text x="800" y="320" text-anchor="middle" font-family="'Georgia', serif" font-size="13" font-weight="400" letter-spacing="6" fill="#c9a84c" opacity="0.7">ИНВЕСТИЦИОННАЯ КОМПАНИЯ</text>

  <text x="800" y="420" text-anchor="middle" font-family="'Georgia', serif" font-size="68" font-weight="700" letter-spacing="8" fill="url(#gold)" filter="url(#glow)">АРХАР КВАРЦ</text>

  <!-- Divider line -->
  <line x1="600" y1="450" x2="1000" y2="450" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- Metrics row -->
  <g transform="translate(420, 520)">
    <!-- Metric 1 -->
    <text x="0" y="0" font-family="'Arial', sans-serif" font-size="36" font-weight="700" fill="#e8c96a">₽2.4 млрд</text>
    <text x="0" y="28" font-family="'Arial', sans-serif" font-size="12" letter-spacing="2" fill="#c9a84c" opacity="0.6">АКТИВЫ ПОД УПРАВЛЕНИЕМ</text>

    <!-- Metric 2 -->
    <text x="250" y="0" font-family="'Arial', sans-serif" font-size="36" font-weight="700" fill="#e8c96a">28.4%</text>
    <text x="250" y="28" font-family="'Arial', sans-serif" font-size="12" letter-spacing="2" fill="#c9a84c" opacity="0.6">ДОХОДНОСТЬ ЗА 2023</text>

    <!-- Metric 3 -->
    <text x="490" y="0" font-family="'Arial', sans-serif" font-size="36" font-weight="700" fill="#e8c96a">12 лет</text>
    <text x="490" y="28" font-family="'Arial', sans-serif" font-size="12" letter-spacing="2" fill="#c9a84c" opacity="0.6">НА РЫНКЕ</text>

    <!-- Metric 4 -->
    <text x="680" y="0" font-family="'Arial', sans-serif" font-size="36" font-weight="700" fill="#e8c96a">340+</text>
    <text x="680" y="28" font-family="'Arial', sans-serif" font-size="12" letter-spacing="2" fill="#c9a84c" opacity="0.6">ИНВЕСТОРОВ</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="850" width="1600" height="2" fill="url(#gold)" opacity="0.3"/>

  <!-- Corner decorations -->
  <rect x="30" y="30" width="60" height="2" fill="#c9a84c" opacity="0.4"/>
  <rect x="30" y="30" width="2" height="60" fill="#c9a84c" opacity="0.4"/>
  <rect x="1510" y="30" width="60" height="2" fill="#c9a84c" opacity="0.4"/>
  <rect x="1568" y="30" width="2" height="60" fill="#c9a84c" opacity="0.4"/>
  <rect x="30" y="868" width="60" height="2" fill="#c9a84c" opacity="0.4"/>
  <rect x="30" y="808" width="2" height="60" fill="#c9a84c" opacity="0.4"/>
  <rect x="1510" y="868" width="60" height="2" fill="#c9a84c" opacity="0.4"/>
  <rect x="1568" y="808" width="2" height="60" fill="#c9a84c" opacity="0.4"/>
</svg>
